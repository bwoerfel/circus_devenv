# =============================================================================
# CA-1 Motor Controller – Docker Publish
# Builds and pushes the dev container image to ghcr.io on changes to the
# Dockerfile or devcontainer config, and on a weekly schedule to pick up
# base-image security patches.
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [ main ]
    paths:
      - "docker/Dockerfile"
      - ".devcontainer/devcontainer.json"
  schedule:
    # Rebuild weekly on Monday 04:00 UTC to pick up upstream security patches
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bwoerfel/ca1_motor_ctrl

jobs:
  build-and-push:
    name: Build & Push Dev Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline,mode=max
